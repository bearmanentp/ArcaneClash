<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>🌌 Arcane Clash</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR',sans-serif;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);color:#fff;min-height:100vh}
h1{text-align:center;font-size:2.5em;margin:20px 0 5px;background:linear-gradient(90deg,#f7971e,#ffd200);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sub{text-align:center;color:#aaa;margin-bottom:15px;font-size:.9em}
.box{background:rgba(255,255,255,.08);backdrop-filter:blur(15px);border:1px solid rgba(255,255,255,.15);border-radius:18px;padding:22px;margin:14px auto;max-width:800px}
input,textarea{width:100%;padding:12px;font-size:15px;border-radius:10px;border:2px solid rgba(255,255,255,.2);background:rgba(255,255,255,.1);color:#fff;margin:6px 0;resize:none;outline:none}
input:focus,textarea:focus{border-color:#667eea}
button{padding:12px 22px;font-size:15px;border:none;border-radius:10px;cursor:pointer;font-weight:bold;margin:4px;transition:all .2s}
button:hover{transform:translateY(-2px)}
button:disabled{opacity:.4}
.bu{background:#333;color:#fff}
.bs{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
.bc{background:linear-gradient(135deg,#eb3349,#f45c43);color:#fff;width:100%}
.bsp{background:linear-gradient(135deg,#f7971e,#ffd200);color:#333;width:100%}
.arena{display:none;grid-template-columns:1fr 80px 1fr;gap:15px;align-items:center}
.pc{background:rgba(255,255,255,.08);border-radius:14px;padding:18px;text-align:center;border:2px solid rgba(255,255,255,.1);transition:all .3s}
.pc.on{border-color:#ffd200;box-shadow:0 0 30px rgba(255,210,0,.3)}
.hpb{height:26px;background:rgba(0,0,0,.4);border-radius:8px;overflow:hidden;margin:8px 0}
.hp{height:100%;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:.85em;transition:width .7s;border-radius:8px;min-width:25px}
.hpp{background:linear-gradient(90deg,#00c853,#64dd17)}
.hpa{background:linear-gradient(90deg,#f50057,#ff1744)}
.hl{animation:bl .6s infinite}@keyframes bl{0%,100%{opacity:1}50%{opacity:.35}}
.vs{font-size:2.2em;font-weight:900;color:#ffd200}
.bd{display:inline-block;padding:3px 10px;border-radius:14px;font-size:.75em;font-weight:bold;margin-top:4px}
.br{background:#ffd200;color:#333}.buu{background:#333;color:#777}
.tm{color:#ffd200;font-weight:bold;margin-top:6px;display:none}
.dc{background:rgba(102,126,234,.15);border:2px solid #667eea;border-radius:12px;padding:16px;margin:10px 0;display:none}
.cn{font-size:1.3em;font-weight:bold;color:#ffd200}
.ca{color:#f50057}.ch{color:#00c853}.cf{color:#00c6ff}
#pa{display:none;margin-top:10px}
#lg{max-height:280px;overflow-y:auto;padding:10px;background:rgba(0,0,0,.3);border-radius:10px}
.en{padding:10px 12px;margin:5px 0;border-radius:8px;background:rgba(255,255,255,.07);border-left:4px solid #667eea;animation:sl .3s;font-size:.85em;line-height:1.4}
.en.at{border-left-color:#f50057}.en.he{border-left-color:#00c853}
.en.de{border-left-color:#00c6ff}.en.cr{border-left-color:#ffd200;font-weight:bold}
.en.sy{border-left-color:#555;color:#888;font-size:.8em}
@keyframes sl{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:translateX(0)}}
.th{display:none;text-align:center;padding:15px;font-size:1.1em;color:#ff6b6b}
#ov{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.95);z-index:1000;flex-direction:column;justify-content:center;align-items:center}
.wt{font-size:3.5em;font-weight:900;margin-bottom:12px;background:linear-gradient(90deg,#f7971e,#ffd200);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
</style>
</head>
<body>

<h1>🌌 Arcane Clash</h1>
<p class="sub">카드를 대면 랜덤 드로우! 주문으로 AI와 대전!</p>

<div class="box" id="lobby">
<input type="text" id="nm" placeholder="닉네임 입력" maxlength="12">
<div style="display:flex;gap:8px;margin-top:4px">
<button class="bu" onclick="connectUSB()" id="ub">🔌 USB</button>
<button class="bs" onclick="startGame()">⚔️ 시작</button>
</div>
<div id="ms" style="margin-top:8px;font-weight:bold"></div>
</div>

<div class="box arena" id="ar">
<div class="pc" id="pc">
<h2 id="pn" style="font-size:1.1em">Player</h2>
<div class="hpb"><div class="hp hpp" id="ph" style="width:100%">100</div></div>
<div id="ps" class="bd br">⚡ READY</div>
<div class="tm" id="pt">▶ YOUR TURN</div>
</div>
<div style="text-align:center"><span class="vs">VS</span><br><span style="color:#aaa;font-size:.75em" id="tc">0/25</span></div>
<div class="pc" id="ac">
<h2 style="font-size:1.1em">🤖 Guardian</h2>
<div class="hpb"><div class="hp hpa" id="ah" style="width:100%">100</div></div>
</div>
</div>

<div class="box" id="da" style="display:none">
<h2>🃏 카드를 리더기에 대주세요!</h2>
<div class="dc" id="dc"><div class="cn" id="cn"></div><div id="ct"></div><div style="color:#aaa;font-size:.85em;margin-top:4px" id="cd"></div></div>
<div id="pa">
<textarea id="pi" rows="3" placeholder="주문을 입력하세요! 예: 불꽃 폭풍으로 태워라!"></textarea>
<button class="bc" onclick="cast(false)">🎴 일반 시전</button>
<button class="bsp" onclick="cast(true)" id="sb" style="display:none;margin-top:5px">⚡ 스페셜!</button>
</div>
</div>

<div class="th" id="th">🤖 AI 생각 중...</div>

<div class="box" id="lb" style="display:none"><h3 style="margin-bottom:8px">📜 로그</h3><div id="lg"></div></div>

<div id="ov">
<div class="wt" id="wt"></div>
<p style="color:#aaa;margin-bottom:20px" id="ws"></p>
<button onclick="location.reload()" style="padding:12px 35px;font-size:1.1em;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:12px;cursor:pointer">🔄 다시</button>
</div>

<script>
// ★ 앱스크립트 배포 URL ★
const API="https://script.google.com/macros/s/AKfycbxG12FF1d7w8PHm9Glh7xGf2oREqQi0Nkx4hfoif7VC_M4LGQkhTh7R3adxtfoAzXsbrg/exec";

let gid=null,port=null,wtr=null,busy=false,ls="";

// ===== API 호출 (GET 방식, redirect follow) =====
async function api(action,params){
  let qs=params?'&'+Object.entries(params).map(([k,v])=>k+'='+encodeURIComponent(String(v))).join('&'):'';
  let url=API+'?action='+action+qs;
  let res=await fetch(url,{redirect:'follow'});
  return await res.json();
}

// ===== USB =====
async function connectUSB(){
  if(!("serial"in navigator))return alert("Chrome!");
  try{
    port=await navigator.serial.requestPort();
    await port.open({baudRate:115200});
    let e=new TextEncoderStream();e.readable.pipeTo(port.writable);wtr=e.writable.getWriter();
    let d=new TextDecoderStream();port.readable.pipeTo(d.writable);let r=d.readable.getReader();
    document.getElementById('ub').innerText='✅';document.getElementById('ub').disabled=true;
    log('🔌 연결됨','sy');
    (async()=>{while(true){let{value:v,done}=await r.read();if(done)break;if(v&&v.includes('CARD:')&&!busy)onCard();}})();
  }catch(e){alert(e.message)}
}

// ===== 게임 =====
async function startGame(){
  let n=document.getElementById('nm').value.trim();
  if(!n)return alert('닉네임!');
  document.getElementById('ms').innerHTML='⏳';
  try{
    let d=await api('startGame',{player:n});
    if(d.success){
      gid=d.gameId;
      document.getElementById('lobby').style.display='none';
      document.getElementById('ar').style.display='grid';
      document.getElementById('da').style.display='block';
      document.getElementById('lb').style.display='block';
      document.getElementById('pn').innerText=n;
      document.getElementById('pt').style.display='block';
      document.getElementById('pc').classList.add('on');
      log('🌌 게임 시작! 카드를 대세요!','sy');
    } else {
      document.getElementById('ms').innerHTML='❌ '+JSON.stringify(d);
    }
  }catch(e){document.getElementById('ms').innerHTML='❌ '+e.message}
}

function onCard(){
  if(!gid||busy||document.getElementById('pt').style.display!=='block')return;
  draw();
}

async function draw(){
  if(busy||!gid)return;busy=true;
  try{
    let d=await api('drawCard',{gameId:gid});
    if(d.success){
      let c=d.card;
      let tm={Attack:'⚔️ 공격',Heal:'💚 회복',Defense:'🛡️ 방어'};
      let cm={Attack:'ca',Heal:'ch',Defense:'cf'};
      document.getElementById('cn').innerText='✨ '+c.name;
      document.getElementById('ct').className=cm[c.type]||'';
      document.getElementById('ct').innerText=tm[c.type]||c.type;
      document.getElementById('cd').innerText=c.desc;
      document.getElementById('dc').style.display='block';
      document.getElementById('pa').style.display='block';
      document.getElementById('pi').value='';
      document.getElementById('pi').focus();
      let s=document.getElementById('ps').innerText;
      document.getElementById('sb').style.display=s.includes('READY')?'block':'none';
      log('🃏 '+c.name+' 드로우!','sy');
    }
  }catch(e){console.error(e)}
  busy=false;
}

async function cast(sp){
  let p=document.getElementById('pi').value.trim();
  if(!p)return alert('주문 입력!');
  document.getElementById('dc').style.display='none';
  document.getElementById('pa').style.display='none';
  document.getElementById('pt').style.display='none';
  document.getElementById('pc').classList.remove('on');
  document.getElementById('th').style.display='block';
  busy=true;
  try{
    await api('playerTurn',{gameId:gid,prompt:p,isSpecial:sp});
    await ref();
    document.getElementById('ac').classList.add('on');
    await new Promise(r=>setTimeout(r,1800));
    await api('aiTurn',{gameId:gid});
    await ref();
    document.getElementById('th').style.display='none';
    document.getElementById('ac').classList.remove('on');
    document.getElementById('pi').value='';
  }catch(e){console.error(e);document.getElementById('th').style.display='none'}
  busy=false;
}

async function ref(){
  if(!gid)return;
  try{
    let d=await api('getState',{gameId:gid});
    if(!d.success)return;
    let g=d.game;
    let pe=document.getElementById('ph'),ae=document.getElementById('ah');
    pe.style.width=Math.max(g.playerHP,3)+'%';pe.innerText=g.playerHP;
    ae.style.width=Math.max(g.aiHP,3)+'%';ae.innerText=g.aiHP;
    pe.classList.toggle('hl',g.playerHP<=30);ae.classList.toggle('hl',g.aiHP<=30);
    document.getElementById('tc').innerText=g.turnNum+'/25';
    let my=g.status==='WAITING_CARD'||g.status==='PLAYER_PROMPT';
    document.getElementById('pt').style.display=my?'block':'none';
    document.getElementById('pc').classList.toggle('on',my);
    let s=document.getElementById('ps');
    if(g.playerSpecial==='READY'){s.innerText='⚡ READY';s.className='bd br'}
    else{s.innerText='⚡ USED';s.className='bd buu'}
    if(g.lastStory&&g.lastStory!==ls&&g.turnNum>0){
      ls=g.lastStory;
      let c='';
      if(g.lastRGB==='RED'||g.lastRGB==='RAINBOW')c='at';
      else if(g.lastRGB==='GREEN')c='he';
      else if(g.lastRGB==='CYAN')c='de';
      else if(g.lastRGB==='YELLOW'||g.lastRGB==='GOLD_PULSE')c='cr';
      log(g.lastStory,c);
      if(wtr)wtr.write('RGB:'+g.lastRGB+'\n');
    }
    if(g.status==='FINISHED'){
      let w=g.playerHP>0;
      document.getElementById('wt').innerText=w?'🏆 VICTORY!':'💀 DEFEAT...';
      document.getElementById('ws').innerText=w?'AI를 물리쳤습니다!':'패배...';
      setTimeout(()=>{document.getElementById('ov').style.display='flex'},600);
    }
  }catch(e){console.error(e)}
}

function log(t,c=''){
  let l=document.getElementById('lg'),d=document.createElement('div');
  d.className='en '+(c||'');d.innerText=t;l.appendChild(d);l.scrollTop=l.scrollHeight;
}

setInterval(()=>{if(gid&&!busy)ref()},3000);
</script>
</body>
</html>
