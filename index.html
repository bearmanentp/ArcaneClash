<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>🌌 Arcane Clash - Vision</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR',sans-serif;background:#0a0a1a;color:#fff;min-height:100vh}
h1{text-align:center;font-size:2.3em;padding:15px 0 3px;background:linear-gradient(90deg,#f7971e,#ffd200);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.box{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:18px;margin:10px auto;max-width:780px}
#camera-container{position:relative;width:100%;max-width:640px;margin:0 auto;border-radius:12px;overflow:hidden;border:2px solid #667eea}
#camera-video{width:100%;height:auto;display:block}
#camera-canvas{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
#timer{position:absolute;top:10px;right:10px;background:rgba(0,0,0,.7);padding:4px 12px;border-radius:20px;font-weight:bold}
button{padding:12px 24px;font-size:15px;border:none;border-radius:10px;cursor:pointer;font-weight:bold;margin:4px}
.b2{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
.ba{background:linear-gradient(135deg,#e53935,#ff1744);color:#fff}
.bs{background:linear-gradient(135deg,#ffd200,#ffab00);color:#222}
</style>
</head>
<body>

<h1>🌌 Arcane Clash - Vision</h1>
<p style="text-align:center;color:#666">카메라로 물체를 말하면 AI가 판단합니다</p>

<div class="box" id="lobby">
<input type="text" id="nm" placeholder="닉네임" maxlength="12">
<button class="b2" onclick="startGame()">게임 시작</button>
</div>

<div class="box" id="ar" style="display:none">
<div style="display:grid;grid-template-columns:1fr 70px 1fr;gap:15px">
<div>
<h2 id="pn">Player</h2>
<div style="height:26px;background:#222;border-radius:8px;overflow:hidden;margin:8px 0">
<div id="ph" style="height:100%;width:100%;background:linear-gradient(90deg,#00c853,#69f0ae);display:flex;align-items:center;justify-content:center;font-weight:bold">100</div>
</div>
</div>
<div style="text-align:center"><span style="font-size:2em">VS</span><br><span id="tc" style="color:#ffd200">턴 1</span></div>
<div>
<h2>🤖 Guardian</h2>
<div style="height:26px;background:#222;border-radius:8px;overflow:hidden;margin:8px 0">
<div id="ah" style="height:100%;width:100%;background:linear-gradient(90deg,#e53935,#ff1744);display:flex;align-items:center;justify-content:center;font-weight:bold">100</div>
</div>
</div>
</div>

<div id="vision-area" style="margin-top:15px">
<h3>📷 카메라</h3>
<div id="camera-container">
<video id="camera-video" autoplay playsinline></video>
<canvas id="camera-canvas"></canvas>
<div id="timer">30s</div>
</div>

<div style="margin-top:15px">
<textarea id="pi" rows="2" placeholder="예: 빨간 사과를 찾아라" onpaste="return false"></textarea>
<div style="display:flex;gap:8px;margin-top:8px">
<button class="ba" onclick="cast(false)">⚔️ 시전</button>
<button class="bs" onclick="cast(true)">⚡ 스페셜</button>
</div>
</div>
</div>

<div id="story-box" style="display:none;margin-top:15px;padding:16px;background:rgba(255,210,0,.06);border:1px solid rgba(255,210,0,.2);border-radius:12px">
<div id="story-text"></div>
</div>

<div id="lg" style="max-height:200px;overflow-y:auto;margin-top:15px;padding:10px;background:rgba(0,0,0,.3);border-radius:10px"></div>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbzxvqywcYbB1hy2OpBo6cekMAZQpY9_U_t6mYzJZTmNRtdlYTZyRsMjePrzl987auXxEg/exec";
let gid = null;
let stream = null;
let timerInterval = null;
let timeLeft = 30;
let curCard = null;

// ==================== 카메라 ====================
async function startCamera() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
    document.getElementById('camera-video').srcObject = stream;
  } catch(e) {
    alert("카메라 접근 실패: " + e.message);
  }
}

// ==================== 타이머 ====================
function startTimer() {
  clearInterval(timerInterval);
  timeLeft = 30;
  document.getElementById('timer').innerText = timeLeft + 's';
  
  timerInterval = setInterval(() => {
    timeLeft--;
    document.getElementById('timer').innerText = timeLeft + 's';
    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      autoTimeout();
    }
  }, 1000);
}

function stopTimer() {
  clearInterval(timerInterval);
}

// ==================== 시간 초과 ====================
async function autoTimeout() {
  const playerName = document.getElementById('pn').innerText;
  const story = `⏰ 시간이 초과되어 ${playerName}은(는) 공격을 하지 못했다.`;
  showStory(story);
  log(story, 'sy');
  
  document.getElementById('pt').style.display = 'none';
  document.getElementById('pc').classList.remove('on');
  document.getElementById('dc').style.display = 'none';
  document.getElementById('pa').style.display = 'none';

  document.getElementById('ac').classList.add('on');
  await new Promise(r => setTimeout(r, 1500));

  // AI 턴 (미리 준비된 프롬프트 사용)
  const aiPrompts = [
    "어둠의 손이 뻗어져 나온다",
    "얼음 폭풍이 몰아친다",
    "번개가 하늘을 가른다",
    "용의 숨결이 뿜어져 나온다"
  ];
  const randomPrompt = aiPrompts[Math.floor(Math.random() * aiPrompts.length)];
  
  try {
    const aiResult = await api('aiTurn', {gameId: gid, prompt: randomPrompt});
    if (aiResult.success) {
      updateHP(aiResult.playerHP, aiResult.aiHP);
      showStory('🤖 ' + aiResult.story);
      log('🤖 ' + aiResult.story);
    }
  } catch(e) {}
  
  document.getElementById('ac').classList.remove('on');
}

// ==================== API ====================
async function api(action, params) {
  const qs = params ? '&' + Object.entries(params).map(([k,v]) => k + '=' + encodeURIComponent(String(v))).join('&') : '';
  const res = await fetch(API + '?action=' + action + qs, {redirect:'follow'});
  return await res.json();
}

// ==================== 게임 시작 ====================
async function startGame() {
  const n = document.getElementById('nm').value.trim();
  if (!n) return alert('닉네임을 입력하세요!');
  
  const d = await api('startGame', {player: n});
  if (d.success) {
    gid = d.gameId;
    document.getElementById('lobby').style.display = 'none';
    document.getElementById('ar').style.display = 'grid';
    document.getElementById('pn').innerText = n;
    document.getElementById('pt').style.display = 'block';
    document.getElementById('pc').classList.add('on');
    
    await startCamera();
    startTimer();
  }
}

// ==================== 시전 ====================
async function cast(isSp) {
  const prompt = document.getElementById('pi').value.trim();
  if (!prompt) return alert('주문을 입력하세요!');
  
  stopTimer();
  document.getElementById('th').style.display = 'block';
  document.getElementById('th').innerHTML = '🔍 분석 중...';

  let visionScore = 0.5;
  
  if (!isSp) {
    // Vision 분석
    visionScore = await analyzeVision(prompt);
  } else {
    visionScore = 1.0; // 스페셜은 무조건 최대
  }

  const result = await api('playerTurn', {
    gameId: gid,
    prompt: prompt,
    isSpecial: isSp ? 'true' : 'false',
    visionScore: visionScore
  });

  if (result.success) {
    updateHP(result.playerHP, result.aiHP);
    showStory(result.story);
    log(result.story);
    
    if (result.status === 'FINISHED') {
      endGame(result.playerHP > 0);
      return;
    }
  }

  // AI 턴
  document.getElementById('ac').classList.add('on');
  await new Promise(r => setTimeout(r, 1800));

  const aiPrompts = [
    "어둠의 손이 뻗어져 나온다",
    "얼음 폭풍이 몰아친다",
    "번개가 하늘을 가른다",
    "용의 숨결이 뿜어져 나온다"
  ];
  const randomPrompt = aiPrompts[Math.floor(Math.random() * aiPrompts.length)];
  
  const aiResult = await api('aiTurn', {gameId: gid, prompt: randomPrompt});
  if (aiResult.success) {
    updateHP(aiResult.playerHP, aiResult.aiHP);
    showStory('🤖 ' + aiResult.story);
    log('🤖 ' + aiResult.story);
  }

  document.getElementById('th').style.display = 'none';
  document.getElementById('ac').classList.remove('on');
  document.getElementById('pi').value = '';
  startTimer();
}

// ==================== Vision 분석 ====================
async function analyzeVision(prompt) {
  const video = document.getElementById('camera-video');
  const canvas = document.createElement('canvas');
  canvas.width = 640;
  canvas.height = 480;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
  
  const base64 = canvas.toDataURL('image/jpeg', 0.6).split(',')[1];
  
  try {
    const res = await api('visionAnalyze', {
      prompt: prompt,
      image: base64
    });
    return res.score || 0.4;
  } catch(e) {
    return 0.3;
  }
}

// ==================== 상태 갱신 ====================
async function ref() {
  if (!gid) return;
  const d = await api('getState', {gameId: gid});
  if (d.success && d.game) {
    updateHP(d.game.playerHP, d.game.aiHP);
    document.getElementById('tc').innerText = `턴 ${d.game.turnNum}`;
  }
}

function updateHP(p, a) {
  document.getElementById('ph').style.width = Math.max(p, 3) + '%';
  document.getElementById('phl').innerText = p;
  document.getElementById('ah').style.width = Math.max(a, 3) + '%';
  document.getElementById('ahl').innerText = a;
}

function showStory(t) {
  document.getElementById('story-text').innerText = t;
  document.getElementById('story-box').style.display = 'block';
}

function log(t, c = '') {
  const l = document.getElementById('lg');
  const d = document.createElement('div');
  d.className = 'en ' + c;
  d.innerText = t;
  l.appendChild(d);
  l.scrollTop = l.scrollHeight;
}

function endGame(win) {
  document.getElementById('wt').innerText = win ? '🏆 VICTORY!' : '💀 DEFEAT...';
  document.getElementById('ov').style.display = 'flex';
}

// ==================== 초기화 ====================
document.getElementById('pi').addEventListener('keypress', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    cast(false);
  }
});
</script>
</body>
</html>
