<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Arcane Clash</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR',sans-serif;background:#0a0a1a;color:#fff;min-height:100vh}
h1{text-align:center;font-size:2.5em;padding:20px 0 5px;background:linear-gradient(90deg,#f7971e,#ffd200);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sub{text-align:center;color:#555;margin-bottom:15px;font-size:.9em}
.box{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:20px;margin:10px auto;max-width:720px}
input,textarea{width:100%;padding:12px;font-size:15px;border-radius:10px;border:2px solid rgba(255,255,255,.1);background:rgba(255,255,255,.06);color:#fff;margin:5px 0;resize:none;outline:none}
input:focus,textarea:focus{border-color:#667eea}
button{padding:12px 20px;font-size:15px;border:none;border-radius:10px;cursor:pointer;font-weight:bold;margin:4px;transition:all .2s}
button:hover{transform:translateY(-2px)}button:disabled{opacity:.3}
.b1{background:#222;color:#fff}.b2{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
.ba{background:linear-gradient(135deg,#e53935,#ff1744);color:#fff;width:100%;padding:14px}
.bs{background:linear-gradient(135deg,#ffd200,#ffab00);color:#222;width:100%;padding:14px}
.arena{display:none;grid-template-columns:1fr 60px 1fr;gap:12px;align-items:center}
.pc{background:rgba(255,255,255,.05);border-radius:14px;padding:16px;text-align:center;border:2px solid rgba(255,255,255,.08)}
.pc.on{border-color:#ffd200;box-shadow:0 0 25px rgba(255,210,0,.2)}
.hpb{height:28px;background:rgba(0,0,0,.5);border-radius:8px;overflow:hidden;margin:8px 0;position:relative}
.hp{height:100%;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:.85em;transition:width .5s;border-radius:8px;min-width:24px;position:relative;z-index:1}
.hp1{background:linear-gradient(90deg,#00c853,#69f0ae)}.hp2{background:linear-gradient(90deg,#e53935,#ff1744)}
.hp-label{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:2;font-size:.85em;font-weight:bold;text-shadow:0 0 4px #000;pointer-events:none}
.vs{font-size:2em;font-weight:900;color:#ffd200}
.badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:.7em;font-weight:bold;margin-top:4px}
.br{background:#ffd200;color:#222}.bu{background:#333;color:#666}
.tm{color:#ffd200;font-weight:bold;margin-top:6px;display:none}
.card-show{display:none;background:rgba(102,126,234,.1);border:2px solid #667eea;border-radius:14px;padding:16px;margin:10px 0;text-align:center}
.cn{font-size:1.3em;font-weight:bold;color:#ffd200}
.cp{font-size:2em;font-weight:900;color:#ffd200}
.pa{display:none;margin-top:10px}
#story-box{display:none;padding:14px;background:rgba(255,210,0,.06);border:1px solid rgba(255,210,0,.2);border-radius:12px;margin:10px auto;max-width:720px;text-align:center}
#story-text{color:#ffd200;font-style:italic;line-height:1.6}
#lg{max-height:250px;overflow-y:auto;padding:8px;background:rgba(0,0,0,.3);border-radius:10px}
.en{padding:10px;margin:5px 0;border-radius:8px;background:rgba(255,255,255,.05);border-left:4px solid #667eea;font-size:.85em}
.en.at{border-left-color:#ff1744}.en.he{border-left-color:#00c853}.en.de{border-left-color:#00bcd4}
.en.cr{border-left-color:#ffd200;font-weight:bold}.en.sy{color:#888;font-size:.8em}
.th{display:none;text-align:center;padding:16px;color:#ff6b6b}
#ov{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.95);z-index:1000;flex-direction:column;justify-content:center;align-items:center}
.wt{font-size:3.5em;font-weight:900;background:linear-gradient(90deg,#f7971e,#ffd200);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
</style>
</head>
<body>
<h1>🌌 Arcane Clash</h1>
<p class="sub">카드마다 랜덤 능력! AI가 만드는 전투 서사!</p>

<div class="box" id="lobby">
<input type="text" id="nm" placeholder="닉네임 입력" maxlength="12">
<div style="display:flex;gap:8px;margin-top:4px">
<button class="b1" onclick="connectUSB()" id="ub">🔌 USB</button>
<button class="b2" onclick="startGame()">⚔️ 게임 시작</button>
</div>
<div id="ms" style="margin-top:8px;color:#666"></div>
</div>

<div class="box arena" id="ar">
<div class="pc" id="pc">
<h2 id="pn" style="font-size:1.1em">Player</h2>
<div class="hpb"><div class="hp hp1" id="ph" style="width:100%"></div><span class="hp-label" id="phl">100</span></div>
<div id="ps" class="badge br">⚡ READY</div>
<div class="tm" id="pt">▶ YOUR TURN</div>
</div>
<div style="text-align:center"><span class="vs">⚔️</span><br><span style="color:#555;font-size:.7em" id="tc">0/25</span></div>
<div class="pc" id="ac">
<h2 style="font-size:1.1em">🤖 Guardian</h2>
<div class="hpb"><div class="hp hp2" id="ah" style="width:100%"></div><span class="hp-label" id="ahl">100</span></div>
</div>
</div>

<div class="th" id="th">🤖 AI가 마법을 준비 중...</div>

<div class="box" id="da" style="display:none">
<h2 style="margin-bottom:4px">🃏 카드를 리더기에 대주세요!</h2>
<div class="card-show" id="dc">
<div class="cn" id="cn"></div>
<div class="cp" id="cpw"></div>
<div id="ct" style="font-weight:bold;margin:4px 0"></div>
</div>
<div class="pa" id="pa">
<textarea id="pi" rows="2" placeholder="시전할 주문을 입력하세요!"></textarea>
<div style="display:flex;gap:6px;margin-top:6px">
<button class="ba" onclick="cast(false)">⚔️ 시전!</button>
<button class="bs" onclick="cast(true)" id="sb" style="display:none">⚡ 스페셜!</button>
</div>
</div>
</div>

<div id="story-box"><div id="story-text"></div></div>

<div class="box" id="lb" style="display:none"><h3 style="margin-bottom:6px;font-size:.9em">📜 로그</h3><div id="lg"></div></div>

<div id="ov">
<div class="wt" id="wt"></div>
<p style="color:#888;margin-bottom:20px" id="ws"></p>
<button onclick="location.reload()" style="padding:14px 40px;font-size:1.1em;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:12px;cursor:pointer">🔄 다시 하기</button>
</div>

<script>
const API="https://script.google.com/macros/s/AKfycbxqCe8kYiFnX3lnC1z4HGOYZZXRxbCuSLmjrDQQslVJ4iaAa1ENv0pQzAtw6OYqdAgZ7g/exec";
let gid=null,port=null,wtr=null,busy=false,curUid=null;

async function api(action,params){
  const qs=params?'&'+Object.entries(params).map(([k,v])=>k+'='+encodeURIComponent(String(v))).join('&'):'';
  const res=await fetch(API+'?action='+action+qs,{redirect:'follow'});
  return await res.json();
}

async function connectUSB(){
  if(!("serial"in navigator))return alert("Chrome 사용!");
  try{
    port=await navigator.serial.requestPort();await port.open({baudRate:115200});
    const e=new TextEncoderStream();e.readable.pipeTo(port.writable);wtr=e.writable.getWriter();
    const d=new TextDecoderStream();port.readable.pipeTo(d.writable);const r=d.readable.getReader();
    document.getElementById('ub').innerText='✅';document.getElementById('ub').disabled=true;
    log('🔌 RFID 연결됨','sy');
    (async()=>{while(true){const{value:v,done}=await r.read();if(done)break;if(v&&v.includes('CARD:')&&!busy){const uid=v.split('CARD:')[1].trim();if(document.getElementById('pt').style.display==='block')drawCard(uid);}}})();
  }catch(e){alert(e.message)}
}

async function startGame(){
  const n=document.getElementById('nm').value.trim();
  if(!n)return alert('닉네임 입력!');
  try{
    const d=await api('startGame',{player:n});
    console.log('startGame:',d);
    if(d.success){
      gid=d.gameId;
      document.getElementById('lobby').style.display='none';
      document.getElementById('ar').style.display='grid';
      document.getElementById('da').style.display='block';
      document.getElementById('lb').style.display='block';
      document.getElementById('pn').innerText=n;
      document.getElementById('pt').style.display='block';
      document.getElementById('pc').classList.add('on');
      log('🌌 게임 시작!','sy');
      showStory('운명의 대결이 펼쳐진다... 카드를 대라!');
    }
  }catch(e){document.getElementById('ms').innerHTML='❌ '+e.message}
}

async function drawCard(uid){
  if(busy||!gid)return;busy=true;
  try{
    const d=await api('drawCard',{gameId:gid,uid:uid});
    console.log('drawCard:',d);
    if(d.success){
      curUid=d.uid||uid;
      const tm={Attack:'⚔️ 공격',Heal:'💚 회복',Defense:'🛡️ 방어'};
      document.getElementById('cn').innerText='✨ '+d.card.name;
      document.getElementById('cpw').innerText='⚡ '+d.card.power;
      const ct=document.getElementById('ct');
      ct.innerText=tm[d.card.type];ct.style.color=d.card.type=='Attack'?'#ff1744':d.card.type=='Heal'?'#00c853':'#00bcd4';
      document.getElementById('dc').style.display='block';
      document.getElementById('pa').style.display='block';
      document.getElementById('pi').value='';document.getElementById('pi').focus();
      document.getElementById('sb').style.display=document.getElementById('ps').innerText.includes('READY')?'inline-block':'none';
      log('🃏 드로우: '+d.card.name+' ('+tm[d.card.type]+' ⚡'+d.card.power+')','sy');
      showStory(d.story);
      if(wtr)wtr.write('RGB:PURPLE\n');
    } else {
      log('❌ '+(d.message||d.error||'오류'),'sy');
    }
  }catch(e){console.error(e)}
  busy=false;
}

async function cast(isSp){
  const p=document.getElementById('pi').value.trim();
  if(!p)return alert('주문 입력!');
  if(!curUid)return alert('카드를 먼저 뽑으세요!');

  document.getElementById('dc').style.display='none';
  document.getElementById('pa').style.display='none';
  document.getElementById('pt').style.display='none';
  document.getElementById('pc').classList.remove('on');
  document.getElementById('th').style.display='block';
  busy=true;

  try{
    // 1. 플레이어 턴
    console.log('playerTurn 호출...');
    const d=await api('playerTurn',{gameId:gid,prompt:p,isSpecial:String(isSp),uid:curUid});
    console.log('playerTurn 응답:',d);
    
    if(!d.success){
      alert('오류: '+(d.error||d.message));
      document.getElementById('th').style.display='none';
      busy=false;
      return;
    }

    // ★★★ HP 즉시 업데이트 ★★★
    updateHP(d.playerHP,d.aiHP);
    showStory(d.story);
    log(d.story,d.rgb=='YELLOW'?'cr':d.action=='Attack'?'at':d.action=='Heal'?'he':'de');
    
    if(d.action=='Attack'){if(wtr)wtr.write('RGB:RED\n');}
    else if(d.action=='Heal'){if(wtr)wtr.write('RGB:GREEN\n');}
    else{if(wtr)wtr.write('RGB:CYAN\n');}
    if(isSp&&wtr)wtr.write('RGB:YELLOW\n');

    // 게임 종료 체크
    if(d.status=='FINISHED'){
      endGame(d.playerHP>0);
      return;
    }

    // 2. AI 턴
    document.getElementById('ac').classList.add('on');
    document.getElementById('th').innerHTML='🤖 Guardian의 반격!';
    await new Promise(r=>setTimeout(r,2000));

    console.log('aiTurn 호출...');
    const ai=await api('aiTurn',{gameId:gid});
    console.log('aiTurn 응답:',ai);

    if(ai&&ai.success){
      // ★★★ HP 즉시 업데이트 ★★★
      updateHP(ai.playerHP,ai.aiHP);
      showStory('🤖 '+ai.story);
      log('🤖 '+ai.story,'at');
      if(wtr)wtr.write('RGB:'+ai.rgb+'\n');
      
      if(ai.status=='FINISHED'){
        endGame(ai.playerHP>0);
        return;
      }
    }

    // 플레이어 턴 복귀
    document.getElementById('th').style.display='none';
    document.getElementById('th').innerHTML='🤖 AI가 마법을 준비 중...';
    document.getElementById('ac').classList.remove('on');
    document.getElementById('pt').style.display='block';
    document.getElementById('pc').classList.add('on');
    document.getElementById('pi').value='';
    curUid=null;

  }catch(e){
    console.error('cast 오류:',e);
    alert('오류: '+e.message);
    document.getElementById('th').style.display='none';
  }
  busy=false;
}

// ★★★ 이 함수가 핵심 ★★★
function updateHP(p,a){
  console.log('updateHP:',p,a);
  document.getElementById('ph').style.width=Math.max(p,1)+'%';
  document.getElementById('phl').innerText=p;
  document.getElementById('ah').style.width=Math.max(a,1)+'%';
  document.getElementById('ahl').innerText=a;
}

function endGame(win){
  document.getElementById('wt').innerText=win?'🏆 VICTORY!':'💀 DEFEAT...';
  document.getElementById('ws').innerText=win?'AI를 물리쳤습니다!':'패배했습니다...';
  if(wtr)wtr.write(win?'RGB:GOLD_PULSE\n':'RGB:BLINK_RED\n');
  setTimeout(()=>{document.getElementById('ov').style.display='flex'},600);
}

function showStory(t){document.getElementById('story-text').innerText=t;document.getElementById('story-box').style.display='block'}
function log(t,c=''){const l=document.getElementById('lg'),d=document.createElement('div');d.className='en '+(c||'');d.innerText=t;l.appendChild(d);l.scrollTop=l.scrollHeight}
</script>
</body>
</html>
