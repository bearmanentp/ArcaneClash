<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>🌌 Arcane Clash: Complete Mastery</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR',sans-serif;background:#0a0a1a;color:#fff;min-height:100vh}
.box{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:18px;margin:10px auto;max-width:740px}
.arena{display:none;grid-template-columns:1fr 60px 1fr;gap:12px;align-items:center}
.pc{background:rgba(255,255,255,.05);border-radius:14px;padding:15px;text-align:center;border:2px solid rgba(255,255,255,.08)}
.hpb{height:28px;background:rgba(0,0,0,.5);border-radius:8px;overflow:hidden;margin:8px 0;position:relative}
.hp{height:100%;transition:width .6s}
.hp1{background:linear-gradient(90deg,#00c853,#69f0ae)}.hp2{background:linear-gradient(90deg,#e53935,#ff1744)}
.hp-label{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:.85em;text-shadow:0 0 4px #000}
#shield-ui{color:#00bcd4;font-weight:bold;font-size:0.8em;margin-top:5px}
input,textarea{width:100%;padding:11px;font-size:14px;border-radius:10px;border:2px solid #333;background:#111;color:#fff;margin:5px 0}
button{padding:12px;border:none;border-radius:10px;cursor:pointer;font-weight:bold;margin:4px;transition:0.2s}
.b2{background:#667eea;color:#fff;width:100%}.ba{background:#ff1744;color:#fff;width:100%}
.bs{background:linear-gradient(135deg,#ffd200,#ffab00);color:#222;width:100%;animation:gl 2s infinite}
@keyframes gl{0%,100%{box-shadow:0 0 5px #ffd200}50%{box-shadow:0 0 20px #ffd200}}
#timer{text-align:center;font-size:2.5em;font-weight:900;color:#ff6b6b}
#webcam{width:100%;max-width:320px;border-radius:12px;border:2px solid #ffd200;display:none;margin:10px auto;transform:scaleX(-1)}
.log{max-height:120px;overflow-y:auto;background:rgba(0,0,0,0.3);padding:10px;border-radius:10px;font-size:0.8em;margin-top:10px}
</style>
</head>
<body>
<h1 style="text-align:center;padding:20px;color:#ffd200">🌌 Arcane Clash</h1>
<div id="timer">60</div>

<div class="box" id="lobby">
    <input type="text" id="nm" placeholder="닉네임 입력">
    <button class="b2" onclick="startGame()">⚔️ 게임 시작</button>
    <button id="ub" onclick="connectUSB()" style="width:100%;background:#333;color:#fff;margin-top:5px">🔌 리더기 연결</button>
</div>

<div class="box arena" id="ar">
    <div class="pc" id="pc">
        <h2 id="pn" style="font-size:1em">Player</h2>
        <div class="hpb"><div class="hp hp1" id="ph" style="width:100%"></div><span class="hp-label" id="phl">100</span></div>
        <div id="shield-ui">🛡️ 보호막: 0</div>
    </div>
    <div style="text-align:center;font-size:0.8em">VS<br><span id="tc">턴 1</span></div>
    <div class="pc">
        <h2 style="font-size:1em">🤖 Guardian</h2>
        <div class="hpb"><div class="hp hp2" id="ah" style="width:100%"></div><span class="hp-label" id="ahl">100</span></div>
    </div>
</div>

<div class="box" id="da" style="display:none">
    <div id="dc" style="text-align:center;color:#ffd200;margin-bottom:10px;display:none">
        <h3 id="cn">카드명</h3><p id="cp"></p>
    </div>
    <video id="webcam" autoplay playsinline></video>
    <textarea id="pi" rows="2" placeholder="주문을 입력하세요. 스페셜 공격 시 사진 속 방어나 공격 도구를 언급하세요!"></textarea>
    <div style="display:flex;gap:5px">
        <button class="ba" onclick="cast(false)">⚔️ 일반 시전</button>
        <button class="bs" id="sb" onclick="cast(true)">✨ 성유물 각성 (Vision)</button>
    </div>
    <div id="th" style="display:none;text-align:center;color:#ffd200;margin-top:10px">🪄 AI 분석 중...</div>
    <div id="story-box" style="margin-top:15px;color:#ffd200;text-align:center;font-size:0.9em"></div>
    <div class="log" id="lg"></div>
</div>

<canvas id="cap" style="display:none"></canvas>

<script>
const API = "https://script.google.com/macros/s/AKfycbyXn5unM90vGabB1vxaVVTEhd6m6-pj5xYU4PGCQazkBQGRc6oTGR-bC55T5HOHkb4pAg/exec"; // GAS URL 입력
let gid=null, port=null, wtr=null, busy=false, timeLeft=60, timer=null;

async function startGame() {
    const n = document.getElementById('nm').value;
    if(!n) return alert("닉네임!");
    const d = await fetch(API+"?action=startGame&player="+encodeURIComponent(n)).then(r=>r.json());
    if(d.success) {
        gid = d.gameId;
        document.getElementById('lobby').style.display='none';
        document.getElementById('ar').style.display='grid';
        document.getElementById('da').style.display='block';
        startTimer(); initWebcam();
    }
}

async function initWebcam() {
    const stream = await navigator.mediaDevices.getUserMedia({video:true});
    document.getElementById('webcam').srcObject = stream;
    document.getElementById('webcam').style.display = 'block';
}

function startTimer() {
    clearInterval(timer); timeLeft = 60;
    timer = setInterval(() => {
        timeLeft--; document.getElementById('timer').innerText = timeLeft;
        if(timeLeft <= 0) { clearInterval(timer); cast(false); }
    }, 1000);
}

async function connectUSB() {
    try {
        port = await navigator.serial.requestPort();
        await port.open({ baudRate: 115200 });
        const encoder = new TextEncoderStream();
        encoder.readable.pipeTo(port.writable);
        wtr = encoder.writable.getWriter();
        const reader = port.readable.getReader();
        document.getElementById('ub').innerText = "✅ 연결됨";
        while(true) {
            const {value, done} = await reader.read();
            if(done) break;
            const txt = new TextDecoder().decode(value);
            if(txt.includes('CARD:') && !busy) drawCard(txt.split('CARD:')[1].trim());
        }
    } catch(e) { alert(e.message); }
}

async function drawCard(uid) {
    const d = await fetch(API+`?action=drawCard&gameId=${gid}&uid=${uid}`).then(r=>r.json());
    if(d.success) {
        document.getElementById('dc').style.display = 'block';
        document.getElementById('cn').innerText = d.card.name;
        document.getElementById('cp').innerText = `⚡ ${d.card.type} 파워: ${d.card.p}`;
        addLog(d.story);
        if(wtr) wtr.write('RGB:PURPLE\n');
    }
}

async function cast(isSp) {
    const p = document.getElementById('pi').value;
    if(busy) return; busy = true; clearInterval(timer);
    document.getElementById('th').style.display = 'block';
    
    let res;
    if(isSp) {
        const v = document.getElementById('webcam');
        const c = document.getElementById('cap');
        c.width = v.videoWidth; c.height = v.videoHeight;
        c.getContext('2d').drawImage(v, 0, 0);
        const img = c.toDataURL('image/jpeg', 0.5);
        res = await fetch(API, { method:'POST', body:JSON.stringify({action:'specialAttack', gameId:gid, prompt:p, image:img}) }).then(r=>r.json());
    } else {
        res = await fetch(API+`?action=playerTurn&gameId=${gid}&prompt=${encodeURIComponent(p)}`).then(r=>r.json());
    }
    handleResult(res);
}

function handleResult(d) {
    document.getElementById('th').style.display = 'none';
    if(!d.success) { busy=false; startTimer(); return alert(d.message); }
    
    document.getElementById('ph').style.width = d.playerHP + '%';
    document.getElementById('phl').innerText = d.playerHP;
    document.getElementById('ah').style.width = d.aiHP + '%';
    document.getElementById('ahl').innerText = d.aiHP;
    document.getElementById('shield-ui').innerText = `🛡️ 보호막: ${d.shield || 0}`;
    document.getElementById('story-box').innerText = d.story;
    addLog(d.story);
    if(wtr) wtr.write(`RGB:${d.rgb}\n`);

    if(d.aiHP <= 0 || d.playerHP <= 0) return alert(d.aiHP<=0?"🏆 승리!":"💀 패배...");
    
    setTimeout(async () => {
        const ai = await fetch(API+`?action=aiTurn&gameId=${gid}`).then(r=>r.json());
        document.getElementById('ph').style.width = ai.playerHP + '%';
        document.getElementById('phl').innerText = ai.playerHP;
        document.getElementById('shield-ui').innerText = `🛡️ 보호막: 0`;
        document.getElementById('story-box').innerText = ai.story;
        addLog(ai.story);
        if(wtr) wtr.write(`RGB:${ai.rgb}\n`);
        busy = false; document.getElementById('pi').value = ""; startTimer();
    }, 2000);
}

function addLog(t) {
    const l = document.getElementById('lg');
    l.innerHTML = `<div>> ${t}</div>` + l.innerHTML;
}
</script>
</body>
</html>
